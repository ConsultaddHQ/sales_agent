# Railway Deployment Configuration for Image Server
# 
# To deploy:
# 1. Install Railway CLI: npm install -g @railway/cli
# 2. Login: railway login
# 3. Create project: railway init
# 4. Deploy: railway up
# 
# Or use Railway Web UI:
# 1. Go to railway.app
# 2. Create new project
# 3. Connect GitHub repo
# 4. Railway auto-detects Python and uses this config

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn image_server:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
# Railway will automatically provide $PORT
# Add these via Railway dashboard:
# - SUPABASE_URL
# - SUPABASE_KEY
